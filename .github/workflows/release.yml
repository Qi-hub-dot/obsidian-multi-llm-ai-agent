# .github/workflows/release.yml
name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - name: Package plugin
        run: |
          mkdir obsidian-deepseek-organizer
          cp main.js manifest.json styles.css obsidian-deepseek-organizer/
          zip -r obsidian-deepseek-organizer.zip obsidian-deepseek-organizer

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
            obsidian-deepseek-organizer.zip
          generate_release_notes: true
